<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>コンテンツページ</title>
    </head>
    <body>
        <h1>要素の勉強</h1>
        <h2>コンテンツの強調</h2>
        <ul>
            <li>
                em 強調
                <p>このかりんとうは<em>おいしい</em></p>
            </li>
            <li>
                strong 強い強調
                <p>この芋けんぴは<strong>とてもおいしい</strong></p>
            </li>
            <li>
                mark たぶん下線
                <p>この<mark>メロンソーダ</mark>はとてもうまい</p>
            </li>
        </ul>
    </body>
</html>
